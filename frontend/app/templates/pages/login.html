{% extends "base.html" %}
{% block content %}
<div class="container my-5 py-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <h2 class="text-center mb-4 fw-bold">ВХОД</h2>
          <form method="post">
            <div class="mb-3">
              <label class="form-label">Email або логін</label>
              <input type="text" name="username" class="form-control" placeholder="example@mail.com" required>
            </div>
            <div class="mb-4">
              <label class="form-label">Пароль</label>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">ВВІЙТИ</button>
          </form>
          <hr class="my-4">
          <p class="text-center mb-0 text-muted">
            Нема аккаунту? <a href="/sign-up" class="text-decoration-none">Зареєструватися</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
