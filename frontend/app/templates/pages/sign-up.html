{% extends "base.html" %}
{% block content %}
<div class="container my-5 py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <h2 class="text-center mb-4 fw-bold">РЕЄСТРАЦІЯ</h2>
          <form method="post">
            <div class="row g-3 mb-3">
              <div class="col-md-12">
                <label class="form-label">Повне ім'я</label>
                <input type="text" name="full_name" class="form-control" placeholder="Іван Іванов" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Електронна пошта</label>
              <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Вигадайте пароль</label>
              <input type="password" name="password" class="form-control" placeholder="Мінімум 8 символів" required>
            </div>
            <div class="mb-4 form-check">
              <input type="checkbox" class="form-check-input" id="terms" required>
              <label class="form-check-label small" for="terms">Я згоден з правилами магазину і обробкою данних</label>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">СТВОРИТИ АККАУНТ</button>
          </form>
          <p class="text-center mt-4 mb-0 text-muted">
            Вже є профіль? <a href="/login" class="text-decoration-none">Ввійти</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
